<!DOCTYPE html>
<html>
<head>
  <title>F3 Roulette Workout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:black; color:white; font-family:sans-serif; text-align:center;">

<h1>🎡 F3 Roulette Workout</h1>

<button onclick="startGame()">Start Game</button>
<br><br>

<button onclick="placeBet(5)">5</button>
<button onclick="placeBet(10)">10</button>
<button onclick="placeBet(15)">15</button>
<button onclick="placeBet(20)">20</button>
<button onclick="placeBet(25)">25</button>
<button onclick="placeAllIn()">ALL IN</button>

<br><br>

<button onclick="spinWheel()">SPIN</button>
<button onclick="awardPoints(true)">SUCCESS</button>
<button onclick="awardPoints(false)">FAIL</button>

<h2 id="output">Waiting...</h2>

<script>
let players = [];
let currentPlayerIndex = 0;
let currentResult = null;

const segments = [
  { name: "Merkins", points: 1, weight: 14 },
  { name: "Squats", points: 1, weight: 14 },
  { name: "SSH", points: 1, weight: 14 },
  { name: "Plank Jacks", points: 2, weight: 10 },
  { name: "Lunges", points: 2, weight: 10 },
  { name: "Pull Overs", points: 2, weight: 10 },
  { name: "Bobby Hurley", points: 4, weight: 6 },
  { name: "Skull Crushers", points: 4, weight: 6 },
  { name: "Burpees", points: 6, weight: 3 },
];

function startGame(){
  players = [
    {name:"DuckHunt", points:0},
    {name:"Slapshot", points:0},
    {name:"Sparkler", points:0}
  ];
  update();
}

function placeBet(val){
  document.getElementById("output").innerText =
    players[currentPlayerIndex].name + " bets " + val;
}

function placeAllIn(){
  document.getElementById("output").innerText =
    players[currentPlayerIndex].name + " goes ALL IN!";
}

function spinWheel(){
  let total = segments.reduce((a,b)=>a+b.weight,0);
  let rand = Math.random()*total;

  for(let s of segments){
    rand -= s.weight;
    if(rand<=0){
      currentResult = s;
      break;
    }
  }

  document.getElementById("output").innerText =
    "Landed on: " + currentResult.name;
}

function awardPoints(success){
  if(success){
    players[currentPlayerIndex].points += currentResult.points;
  }

  currentPlayerIndex =
    (currentPlayerIndex + 1) % players.length;

  update();
}

function update(){
  let text = players.map(p=>p.name + ": " + p.points).join(" | ");
  document.getElementById("output").innerText = text;
}
</script>

</body>
</html>
